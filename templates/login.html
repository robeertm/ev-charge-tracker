<!DOCTYPE html>
<html lang="de" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — EV Charge Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f2a47 0%, #1e4976 100%);
            padding: 1rem;
        }
        .login-card {
            max-width: 420px;
            width: 100%;
        }
        .login-card .card-header {
            background: #0f2a47;
            color: white;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="card shadow-lg">
            <div class="card-header py-3 text-center">
                <i class="bi bi-ev-front fs-2"></i>
                <div class="fw-bold mt-1">EV Charge Tracker</div>
            </div>
            <div class="card-body p-4">
                <h5 class="text-center mb-4">Anmeldung</h5>

                {% if error %}
                <div class="alert alert-danger small">
                    <i class="bi bi-exclamation-triangle"></i> {{ error }}
                </div>
                {% endif %}

                <form method="POST" action="{{ url_for('login_page') }}">
                    <input type="hidden" name="next" value="{{ next_url }}">

                    <div class="mb-3">
                        <label class="form-label">Benutzername</label>
                        <input type="text" class="form-control" name="username"
                               autofocus required autocomplete="username">
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Passwort</label>
                        <input type="password" class="form-control" name="password"
                               required autocomplete="current-password">
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-box-arrow-in-right"></i> Anmelden
                        </button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-center text-muted small py-2">
                Tailscale schützt das Netzwerk, diese Seite deine Daten.
            </div>
        </div>
    </div>
</body>
</html>
