{% extends "base.html" %}
{% block title %}Bearbeiten — EV Charge Tracker{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6 col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0"><i class="bi bi-pencil"></i> Eintrag bearbeiten</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="date" class="form-label fw-bold">Datum</label>
                        <input type="date" class="form-control" id="date" name="date"
                               value="{{ charge.date.isoformat() }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Stromart</label>
                        <div class="btn-group w-100">
                            <input type="radio" class="btn-check" name="charge_type" id="typeAC" value="AC"
                                   {% if charge.charge_type == 'AC' %}checked{% endif %}>
                            <label class="btn btn-outline-success" for="typeAC">AC</label>
                            <input type="radio" class="btn-check" name="charge_type" id="typeDC" value="DC"
                                   {% if charge.charge_type == 'DC' %}checked{% endif %}>
                            <label class="btn btn-outline-warning" for="typeDC">DC</label>
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-6">
                            <label class="form-label">€/kWh</label>
                            <input type="number" class="form-control" name="eur_per_kwh"
                                   value="{{ charge.eur_per_kwh }}" step="0.01">
                        </div>
                        <div class="col-6">
                            <label class="form-label">kWh geladen</label>
                            <input type="number" class="form-control" name="kwh_loaded"
                                   value="{{ charge.kwh_loaded }}" step="0.001" required>
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-6">
                            <label class="form-label">SoC von %</label>
                            <input type="number" class="form-control" name="soc_from"
                                   value="{{ charge.soc_from if charge.soc_from is not none else '' }}">
                        </div>
                        <div class="col-6">
                            <label class="form-label">SoC bis %</label>
                            <input type="number" class="form-control" name="soc_to"
                                   value="{{ charge.soc_to if charge.soc_to is not none else '' }}">
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-6">
                            <label class="form-label">Ladeverluste kWh</label>
                            <input type="number" class="form-control" name="loss_kwh"
                                   value="{{ charge.loss_kwh if charge.loss_kwh is not none else '' }}" step="0.001">
                        </div>
                        <div class="col-6">
                            <label class="form-label">CO₂ g/kWh</label>
                            <input type="number" class="form-control" name="co2_g_per_kwh"
                                   value="{{ charge.co2_g_per_kwh if charge.co2_g_per_kwh is not none else '' }}">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Notizen</label>
                        <input type="text" class="form-control" name="notes"
                               value="{{ charge.notes or '' }}">
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-grow-1">
                            <i class="bi bi-check"></i> Speichern
                        </button>
                        <a href="/history" class="btn btn-outline-secondary">Abbrechen</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
